<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapWorks</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
position:relative;
display:flex;
justify-content:center;
align-items:center;
perspective:1000px;
}

/* ===== BACKGROUND 3D ===== */
body::before{
content:"";
position:absolute;
width:220%;
height:220%;
background:
radial-gradient(circle at 20% 30%, #00ffff25, transparent 25%),
radial-gradient(circle at 80% 70%, #ff00ff20, transparent 25%),
radial-gradient(circle at 50% 50%, #0066ff25, transparent 35%);
animation:bgMove 18s linear infinite;
transform-style:preserve-3d;
will-change:transform;
}

@keyframes bgMove{
from{transform:rotate(0deg) translateZ(0);}
to{transform:rotate(360deg) translateZ(60px);}
}

/* ===== LIGNES ===== */
.line{
position:absolute;
width:2px;
height:260px;
background:linear-gradient(transparent,#00ffffaa,transparent);
filter:blur(1px);
opacity:.8;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(-350px);opacity:0;}
20%{opacity:.9;}
to{transform:translateY(calc(100vh + 350px));opacity:0;}
}

/* ===== CONTAINER CENTRÉ PARFAIT ===== */
.container{
position:relative;
z-index:10;
height:100vh;
width:100vw;

display:grid;
grid-template-rows:1fr auto 1fr;
place-items:center;

text-align:center;
padding:60px 20px;
}

/* ===== LOGO ===== */
.logo{
font-size:7.2rem;
font-weight:900;
letter-spacing:10px;
text-transform:uppercase;

background:linear-gradient(90deg,#00ffff,#00aaff,#ff00ff,#00ffff);
background-size:320% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 6s linear infinite,float 5s ease-in-out infinite;

cursor:pointer;
user-select:none;

/* petit effet profondeur */
filter:drop-shadow(0 0 20px rgba(0,255,255,0.15));
}

@keyframes shine{
from{background-position:0% center;}
to{background-position:320% center;}
}

@keyframes float{
0%,100%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
}

/* ===== ZONE CENTRE ===== */
.center-zone{
grid-row:2;
display:flex;
justify-content:center;
align-items:center;
}

/* ===== BOUTON ===== */
.enter-btn{
position:relative;
display:inline-block;
padding:18px 44px;
color:white;
text-decoration:none;
font-size:1.15rem;
letter-spacing:1px;

border:2px solid #00ffff;
border-radius:999px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(12px);

box-shadow:
0 0 18px rgba(0,255,255,0.5),
0 0 45px rgba(0,255,255,0.25);

transition:.35s;
overflow:hidden;
cursor:pointer;
}

/* shine */
.enter-btn::before{
content:"";
position:absolute;
top:0;
left:-140%;
width:120%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.7),transparent);
transition:.7s;
}

.enter-btn:hover::before{
left:140%;
}

.enter-btn:hover{
transform:translateY(-5px) scale(1.06);
box-shadow:
0 0 28px #00ffff,
0 0 70px #00ffff,
0 0 120px rgba(0,255,255,0.6);
}

/* ===== SUBTITLE ===== */
.subtitle{
grid-row:3;
color:#b6c5ff;
letter-spacing:7px;
font-size:1rem;
opacity:.9;
}

/* ===== GLOW ===== */
.glow{
position:absolute;
width:520px;
height:520px;
border-radius:50%;
filter:blur(130px);
z-index:0;
transition:transform .1s linear;
}

.glow1{
background:#00ffff18;
left:-180px;
top:-180px;
}

.glow2{
background:#ff00ff18;
right:-180px;
bottom:-180px;
}

/* ===== LIGNES ===== */
@keyframes fall{
from{transform:translateY(-350px);opacity:0;}
20%{opacity:.9;}
to{transform:translateY(calc(100vh + 350px));opacity:0;}
}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
.logo{
font-size:4.2rem;
letter-spacing:5px;
}
.subtitle{
font-size:.85rem;
letter-spacing:3px;
}
.enter-btn{
padding:15px 32px;
}
}
</style>
</head>

<body>

<div class="glow glow1" id="g1"></div>
<div class="glow glow2" id="g2"></div>

<div class="container">

<h1 class="logo">CAPWORKS</h1>

<div class="center-zone">
<a href="home.html" class="enter-btn">
Entrer dans l'univers →
</a>
</div>

<div class="subtitle">
DÉVELOPPEMENT • CRÉATIVITÉ • PASSION
</div>

</div>

<script>

/* ===== LIGNES ===== */
for(let i=25;i--;){
const l=document.createElement("div");
l.className="line";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(4+Math.random()*8)+"s";
l.style.animationDelay=(-Math.random()*10)+"s";
document.body.appendChild(l);
}

/* ===== PARALLAX 3D ===== */
document.addEventListener("mousemove",(e)=>{
const x=(e.clientX/window.innerWidth-0.5)*30;
const y=(e.clientY/window.innerHeight-0.5)*30;

document.body.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;

document.getElementById("g1").style.transform=`translate(${x}px,${y}px)`;
document.getElementById("g2").style.transform=`translate(${-x}px,${-y}px)`;
});

</script>

</body>
</html>
